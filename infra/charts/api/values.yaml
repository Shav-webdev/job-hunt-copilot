replicaCount: 1

image:
  repository: jobhunt/api
  tag: latest-dev
  pullPolicy: IfNotPresent

service:
  port: 3000

ingress:
  enabled: true
  className: nginx
  host: api.jobhunt.local

env:
  PORT: "3000"
  AGENT_URL: "http://jobhunt-agent:8001"
  REDIS_URL: "redis://redis-master:6379"

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
