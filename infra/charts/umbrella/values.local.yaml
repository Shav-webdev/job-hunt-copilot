# Local overrides — generous limits for k3d dev (no prod-style caps)
web:
  resources:
    requests:
      memory: 512Mi
    limits:
      memory: 2Gi
  env:
    NODE_OPTIONS: "--max-old-space-size=1536"

api:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi

ai-core:
  resources: {}

agent:
  resources: {}
