apiVersion: v1
kind: Service
metadata:
  name: {{ include "ai-core.fullname" . }}
  labels:
    {{- include "ai-core.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "ai-core.selectorLabels" . | nindent 4 }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
      protocol: TCP